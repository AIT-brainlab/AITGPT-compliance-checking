name: devcontainer
services:
  dev:
    image: aitgpt-compliance-checking:latest
    build:
      context: .
      dockerfile: dockerfile
      args:
        - BUILD_VERSION=DEV
        - WORKDIR=/Projects/compliance-checking
    volumes:
      # Team convention: mount entire project folder
      - ../:/Projects/compliance-checking:cached
      # Team convention: named volumes for caching
      - venv:/Projects/compliance-checking/.venv
      - python:/Projects/compliance-checking/.python
      - uv_cache:/Projects/compliance-checking/.uv_cache
      # Team convention: forward Docker socket
      - /var/run/docker.sock:/var/run/docker-host.sock
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aitgpt_cc_db
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: dbpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-run schema on first start
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbuser"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 180s

volumes:
  venv:           # team convention: cache .venv
  python:         # team convention: cache uv-managed Python
  uv_cache:       # team convention: cache uv download cache
  ollama_data:    # persist downloaded models across restarts
  postgres_data:  # persist database data across restarts